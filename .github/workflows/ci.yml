name: CI Pipeline

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

jobs:

  backend-ci:
    name: Backend — Build, Lint, Test, Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: MovieMapUA-main/api/coursework_back/package-lock.json

      - name: Install dependencies
        working-directory: MovieMapUA-main/api/coursework_back
        run: npm ci

      - name: Run lint
        working-directory: MovieMapUA-main/api/coursework_back
        run: npm run lint --if-present || true

      - name: Run tests with coverage
        working-directory: MovieMapUA-main/api/coursework_back
        run: npm run test:coverage --if-present

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: MovieMapUA-main/api/coursework_back/coverage/

  frontend-ci:
    name: Frontend — Build, Lint, Test, Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: MovieMapUA-main/client/coursework_front/package-lock.json

      - name: Install dependencies
        working-directory: MovieMapUA-main/client/coursework_front
        run: npm ci

      - name: Run lint
        working-directory: MovieMapUA-main/client/coursework_front
        run: npm run lint --if-present  || true

      - name: Run tests with coverage
        working-directory: MovieMapUA-main/client/coursework_front
        run: npm run test:coverage --if-present

      - name: Build project
        working-directory: MovieMapUA-main/client/coursework_front
        run: CI=false npm run build

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: MovieMapUA-main/client/coursework_front/coverage/


  run-cd-pipeline:
    name: Call CD Pipeline
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push'
    uses: ./.github/workflows/cd.yml
    secrets: inherit